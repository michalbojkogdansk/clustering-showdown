<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Engineering Foundations</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<link rel="stylesheet" href="shared/style.css" />
</head>
<body class="min-h-screen">
<div id="site-nav"></div>

<main class="max-w-7xl mx-auto px-4 py-10">
  <!-- Hero -->
  <div class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3">
      <span class="text-slate-200">Data Engineering</span>
      <span class="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent"> Foundations</span>
    </h1>
    <p class="text-slate-400 text-lg max-w-2xl mx-auto">Interactive visual lectures for data engineering concepts. Pick a topic, explore the visuals, run the algorithms.</p>
  </div>

  <!-- Topic Grid -->
  <div class="topic-grid" id="topic-grid"></div>
</main>

<footer class="text-center py-6 text-slate-500 text-xs border-t border-slate-800/30 mt-10">
  Built for conference demos &middot; Algorithms run 100% in your browser &middot; No data leaves your machine
</footer>

<script>
  function getPreferredTheme() {
    return localStorage.getItem('de-theme') || 'dark';
  }
  function applyTheme(theme) {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    localStorage.setItem('de-theme', theme);
  }
  function toggleTheme() {
    applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    // Update toggle icon in nav
    var btn = document.getElementById('nav-theme-toggle');
    if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
  }
  applyTheme(getPreferredTheme());

  // Render topic cards
  var topics = [
    { icon: '🔮', title: 'Clustering Showdown', desc: 'KMeans vs DBSCAN — interactive comparison with benchmarks, business analysis, and scaling tests.', href: 'clustering.html', status: 'live' },
    { icon: '📊', title: 'Bins & Histograms', desc: 'Understanding data distribution through binning strategies. Bin width, density plots, and skewness detection.', href: 'bins.html', status: 'soon' },
    { icon: '🔥', title: 'Failure Detection', desc: 'Building systems that detect failures before they happen. From thresholds to ML-powered anomaly detection.', href: 'failure-detection.html', status: 'soon' },
    { icon: '📈', title: 'Regression Analysis', desc: 'From linear regression to real-world predictive modeling. When it works, when it fails, and how to interpret results.', href: 'regression.html', status: 'soon' },
    { icon: '⚡', title: 'Spikes & Anomaly Detection', desc: 'Detecting unusual spikes in metrics, traffic, and system behavior with statistical methods.', href: 'spikes.html', status: 'soon' },
    { icon: '📋', title: 'Log-Driven Development', desc: 'Using structured logging as a foundation for observability, debugging, and data pipelines.', href: 'log-driven.html', status: 'soon' },
  ];

  var grid = document.getElementById('topic-grid');
  grid.innerHTML = topics.map(function(t) {
    var badge = t.status === 'live'
      ? '<span class="status-live">● Live</span>'
      : '<span class="status-soon">🚧 Coming Soon</span>';
    return '<a class="card topic-card" href="' + t.href + '">' +
      '<div class="flex items-center justify-between mb-3">' +
        '<span class="text-3xl">' + t.icon + '</span>' +
        badge +
      '</div>' +
      '<h2 class="text-lg font-bold mb-1.5 text-slate-200">' + t.title + '</h2>' +
      '<p class="text-sm text-slate-400 leading-relaxed">' + t.desc + '</p>' +
    '</a>';
  }).join('');
</script>
<script src="shared/nav.js"></script>
</body>
</html>
