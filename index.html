<script>
// ============================================================
// DATASETS
// ============================================================
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

function generateDataset(id) {
  const rng = mulberry32(42);
  const gauss = () => { let u=0,v=0; while(u===0)u=rng(); while(v===0)v=rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); };
  const pts = [];

  if (id === 'server-logs') {
    // Cluster 1: Normal traffic (low CPU, low mem)
    for(let i=0;i<80;i++) pts.push({x:20+gauss()*8,y:25+gauss()*7,cluster:-1});
    // Cluster 2: High load (high CPU, high mem)
    for(let i=0;i<60;i++) pts.push({x:70+gauss()*7,y:72+gauss()*8,cluster:-1});
    // Cluster 3: Memory leak (low CPU, high mem)
    for(let i=0;i<40;i++) pts.push({x:25+gauss()*6,y:78+gauss()*5,cluster:-1});
    // Anomalies (scattered)
    for(let i=0;i<15;i++) pts.push({x:rng()*100,y:rng()*100,cluster:-1});
    return { id, name:'Server Logs', description:'CPU vs Memory usage with anomalous requests', xLabel:'CPU Usage (%)', yLabel:'Memory Usage (%)', icon:'🖥️', points:pts };
  }
  if (id === 'sales-data') {
    // Bargain hunters (low spend, high freq)
    for(let i=0;i<70;i++) pts.push({x:10+gauss()*6,y:70+gauss()*8,cluster:-1});
    // Whales (high spend, medium freq)
    for(let i=0;i<35;i++) pts.push({x:80+gauss()*8,y:50+gauss()*10,cluster:-1});
    // Casual buyers (medium spend, low freq)
    for(let i=0;i<55;i++) pts.push({x:45+gauss()*10,y:18+gauss()*7,cluster:-1});
    // VIP tier (very high spend, high freq) — small tight cluster
    for(let i=0;i<20;i++) pts.push({x:88+gauss()*4,y:85+gauss()*4,cluster:-1});
    // Noise
    for(let i=0;i<12;i++) pts.push({x:rng()*100,y:rng()*100,cluster:-1});
    return { id, name:'Sales Data', description:'Average order value vs purchase frequency', xLabel:'Avg Order ($)', yLabel:'Purchase Freq (orders/yr)', icon:'🛒', points:pts };
  }
  // geo-clusters — crescent + blobs (hard for KMeans)
  // Crescent moon shape
  for(let i=0;i<90;i++){const a=Math.PI*rng();const r=35+gauss()*3;pts.push({x:50+r*Math.cos(a),y:40+r*Math.sin(a),cluster:-1});}
  for(let i=0;i<70;i++){const a=Math.PI*rng();const r=20+gauss()*3;pts.push({x:55+r*Math.cos(a),y:47-r*Math.sin(a),cluster:-1});}
  // Dense blob
  for(let i=0;i<50;i++) pts.push({x:20+gauss()*4,y:75+gauss()*4,cluster:-1});
  // Noise
  for(let i=0;i<18;i++) pts.push({x:rng()*100,y:rng()*100,cluster:-1});
  return { id, name:'Geo Clusters', description:'Non-convex shapes — crescent moon + dense blob', xLabel:'Longitude (scaled)', yLabel:'Latitude (scaled)', icon:'🌍', points:pts };
}

const DATASETS_META = [
  { id:'server-logs', name:'Server Logs', icon:'🖥️', hint:'Spherical clusters + anomalies' },
  { id:'sales-data', name:'Sales Data', icon:'🛒', hint:'4 customer segments + noise' },
  { id:'geo-clusters', name:'Geo Clusters', icon:'🌍', hint:'Non-convex shapes (hard for KMeans!)' },
];

// ============================================================
// ALGORITHMS
// ============================================================
function euclidean(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

function runKMeans(rawPoints, k, maxIter=100) {
  const t0 = performance.now();
  const pts = rawPoints.map(p=>({...p,cluster:-1}));
  // Init centroids via KMeans++ 
  const rng = mulberry32(7);
  const centroids = [pts[Math.floor(rng()*pts.length)]];
  while(centroids.length < k){
    const dists = pts.map(p=>Math.min(...centroids.map(c=>euclidean(p,c)**2)));
    const sum = dists.reduce((a,b)=>a+b,0);
    let r = rng()*sum, acc=0;
    for(let i=0;i<dists.length;i++){acc+=dists[i];if(acc>=r){centroids.push(pts[i]);break;}}
  }
  let cents = centroids.map(c=>({x:c.x,y:c.y}));
  for(let iter=0;iter<maxIter;iter++){
    // Assign
    pts.forEach(p=>{let best=0,bestD=Infinity;cents.forEach((c,i)=>{const d=euclidean(p,c);if(d<bestD){bestD=d;best=i;}});p.cluster=best;});
    // Update
    const newCents = cents.map(()=>({sx:0,sy:0,n:0}));
    pts.forEach(p=>{newCents[p.cluster].sx+=p.x;newCents[p.cluster].sy+=p.y;newCents[p.cluster].n++;});
    let converged=true;
    cents.forEach((c,i)=>{
      if(newCents[i].n===0) return;
      const nx=newCents[i].sx/newCents[i].n, ny=newCents[i].sy/newCents[i].n;
      if(Math.abs(nx-c.x)>0.001||Math.abs(ny-c.y)>0.001) converged=false;
      c.x=nx; c.y=ny;
    });
    if(converged) break;
  }
  const ms = performance.now()-t0;
  return { points:pts, clusterCount:k, noiseCount:0, executionMs:ms, silhouetteScore:silhouette(pts,k), centroids:cents };
}

function runDBSCAN(rawPoints, epsilon, minPts) {
  const t0 = performance.now();
  const pts = rawPoints.map(p=>({...p,cluster:-1}));
  const visited = new Set();
  let clusterIdx = 0;

  function regionQuery(p){return pts.filter(q=>euclidean(p,q)<=epsilon);}

  pts.forEach((p,i)=>{
    if(visited.has(i)) return;
    visited.add(i);
    let neighbors = regionQuery(p);
    if(neighbors.length < minPts){ p.cluster=-1; return; }
    p.cluster = clusterIdx;
    const seed = [...neighbors]; const inSeed = new Set(seed.map(q=>pts.indexOf(q)));
    for(let si=0;si<seed.length;si++){
      const q = seed[si]; const qi = pts.indexOf(q);
      if(!visited.has(qi)){
        visited.add(qi);
        const qNeighbors = regionQuery(q);
        if(qNeighbors.length>=minPts) qNeighbors.forEach(n=>{const ni=pts.indexOf(n);if(!inSeed.has(ni)){seed.push(n);inSeed.add(ni);}});
      }
      if(q.cluster===-1) q.cluster=clusterIdx;
    }
    clusterIdx++;
  });

  const ms = performance.now()-t0;
  const noiseCount = pts.filter(p=>p.cluster===-1).length;
  return { points:pts, clusterCount:clusterIdx, noiseCount, executionMs:ms, silhouetteScore:silhouette(pts,clusterIdx) };
}

// Simplified silhouette score
function silhouette(pts, k) {
  if(k<2) return 0;
  const clustered = pts.filter(p=>p.cluster>=0);
  if(clustered.length<3) return 0;
  const sample = clustered.length>200 ? clustered.filter((_,i)=>i%Math.ceil(clustered.length/200)===0) : clustered;
  let total=0;
  sample.forEach(p=>{
    const same = clustered.filter(q=>q.cluster===p.cluster&&q!==p);
    const a = same.length?same.reduce((s,q)=>s+euclidean(p,q),0)/same.length:0;
    let b=Infinity;
    for(let c=0;c<k;c++){if(c===p.cluster)continue;const others=clustered.filter(q=>q.cluster===c);if(!others.length)continue;const avg=others.reduce((s,q)=>s+euclidean(p,q),0)/others.length;if(avg<b)b=avg;}
    if(b===Infinity)b=0;
    total+=(b-a)/Math.max(a,b)||0;
  });
  return total/sample.length;
}

// ============================================================
// COLORS
// ============================================================
const PALETTE = [
  '#6366f1','#f472b6','#34d399','#fbbf24','#60a5fa','#f87171',
  '#a78bfa','#2dd4bf','#fb923c','#e879f9','#4ade80','#38bdf8'
];
const NOISE_COLOR = 'rgba(100,116,139,0.25)';

// ============================================================
// RENDERING
// ============================================================
function drawScatter(canvasId, result, xLabel, yLabel, showCentroids) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const pad = {top:20, right:20, bottom:38, left:46};
  const pw = W-pad.left-pad.right, ph = H-pad.top-pad.bottom;

  // Grid
  ctx.strokeStyle = 'rgba(100,116,139,0.1)';
  ctx.lineWidth = 1;
  for(let i=0;i<=5;i++){
    const x=pad.left+(pw/5)*i, y=pad.top+(ph/5)*i;
    ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+pw,y);ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle='#64748b'; ctx.font='11px system-ui';
  ctx.textAlign='center';
  ctx.fillText(xLabel, pad.left+pw/2, H-4);
  ctx.save(); ctx.translate(12, pad.top+ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(yLabel, 0, 0); ctx.restore();

  // Tick labels
  ctx.font='9px system-ui'; ctx.fillStyle='#475569';
  for(let i=0;i<=5;i++){
    ctx.textAlign='center';
    ctx.fillText(Math.round(i*20), pad.left+(pw/5)*i, pad.top+ph+14);
    ctx.textAlign='right';
    ctx.fillText(Math.round(i*20), pad.left-6, pad.top+ph-(ph/5)*i+3);
  }

  // Points
  const scale = (v, max) => (v / 100) * max;
  // Draw noise first (behind)
  result.points.filter(p=>p.cluster===-1).forEach(p=>{
    const px = pad.left + scale(p.x, pw);
    const py = pad.top + ph - scale(p.y, ph);
    ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=NOISE_COLOR; ctx.fill();
    ctx.strokeStyle='rgba(100,116,139,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
  });
  // Then clustered points
  result.points.filter(p=>p.cluster>=0).forEach(p=>{
    const px = pad.left + scale(p.x, pw);
    const py = pad.top + ph - scale(p.y, ph);
    const col = PALETTE[p.cluster % PALETTE.length];
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2);
    ctx.fillStyle=col; ctx.globalAlpha=0.8; ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle=col; ctx.lineWidth=0.5; ctx.stroke();
  });

  // Centroids
  if(showCentroids && result.centroids){
    result.centroids.forEach((c,i)=>{
      const px = pad.left + scale(c.x, pw);
      const py = pad.top + ph - scale(c.y, ph);
      ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
      ctx.fillStyle=PALETTE[i%PALETTE.length]; ctx.globalAlpha=0.5; ctx.fill(); ctx.globalAlpha=1;
      // Cross
      ctx.beginPath();ctx.moveTo(px-5,py);ctx.lineTo(px+5,py);ctx.moveTo(px,py-5);ctx.lineTo(px,py+5);
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    });
  }
}

// ============================================================
// BENCHMARK CARDS
// ============================================================
function renderBenchmarks(km, db) {
  const cards = [
    { label:'⏱️ Execution Time', kmVal:`${km.executionMs.toFixed(1)}ms`, dbVal:`${db.executionMs.toFixed(1)}ms`, winner: km.executionMs<db.executionMs?'kmeans':'dbscan', kmPct:km.executionMs, dbPct:db.executionMs },
    { label:'📦 Clusters Found', kmVal:km.clusterCount, dbVal:db.clusterCount, winner:null },
    { label:'🔇 Noise Points', kmVal:km.noiseCount, dbVal:db.noiseCount, winner:null },
    { label:'📈 Silhouette Score', kmVal:km.silhouetteScore.toFixed(3), dbVal:db.silhouetteScore.toFixed(3), winner:km.silhouetteScore>db.silhouetteScore?'kmeans':'dbscan' },
  ];
  const container = document.getElementById('benchmark-cards');
  container.innerHTML = cards.map(c => {
    const maxT = Math.max(c.kmPct||1, c.dbPct||1);
    return `
    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
      <div class="text-xs text-slate-400 mb-3">${c.label}</div>
      <div class="flex items-center justify-between mb-1.5">
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-indigo-400 inline-block"></span>
          <span class="text-sm text-slate-300">KMeans</span>
        </div>
        <span class="text-sm font-mono font-bold text-indigo-300 metric-value">${c.kmVal}</span>
      </div>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-pink-400 inline-block"></span>
          <span class="text-sm text-slate-300">DBSCAN</span>
        </div>
        <span class="text-sm font-mono font-bold text-pink-300 metric-value">${c.dbVal}</span>
      </div>
      ${c.winner ? `<div class="mt-2 text-[10px] text-center py-0.5 rounded-full ${c.winner==='kmeans'?'bg-indigo-500/15 text-indigo-300':'bg-pink-500/15 text-pink-300'}">${c.winner==='kmeans'?'KMeans':'DBSCAN'} wins</div>` : ''}
    </div>`;
  }).join('');
}

const INSIGHTS = {

const CODE = {
  'code-kmeans': `<pre><code class="language-python">import numpy as np
from sklearn.cluster import KMeans
import matplotlib.pyplot as plt

# Generate sample data (replace with your dataset)
from sklearn.datasets import make_blobs
X, _ = make_blobs(n_samples=300, centers=4,
                  cluster_std=1.2, random_state=42)

# --- KMeans Clustering ---
kmeans = KMeans(
    n_clusters=4,          # You must choose k upfront
    init='k-means++',      # Smart centroid initialization
    n_init=10,             # Run 10 times, pick best
    max_iter=300,
    random_state=42
)
labels = kmeans.fit_predict(X)
centroids = kmeans.cluster_centers_

# Evaluate with silhouette score
